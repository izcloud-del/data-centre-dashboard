<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Data Centre Monitoring Dashboard</title>

<style>
body {
  font-family: Arial, sans-serif;
  background-color: #020617;
  color: white;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

.container {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 30px;
}

.card {
  background: #0f172a;
  padding: 20px;
  border-radius: 12px;
  width: 220px;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.online { color: #22c55e; }
.offline { color: #ef4444; }
.warning { color: #facc15; }

.alert {
  margin-top: 20px;
  font-weight: bold;
  display: none;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}
</style>
</head>

<body>

<h1>Data Centre Monitoring Dashboard</h1>

<div class="container">

  <div class="card">
    <h3>Server 1</h3>
    <p id="s1-status" class="online">Online</p>
    <p>CPU: <span id="s1-cpu">45</span>%</p>
    <p>Temp: <span id="s1-temp">32</span>°C</p>
  </div>

  <div class="card">
    <h3>Server 2</h3>
    <p id="s2-status" class="online">Online</p>
    <p>CPU: <span id="s2-cpu">30</span>%</p>
    <p>Temp: <span id="s2-temp">28</span>°C</p>
  </div>

  <div class="card">
    <h3>Server 3</h3>
    <p id="s3-status" class="online">Online</p>
    <p>CPU: <span id="s3-cpu">50</span>%</p>
    <p>Temp: <span id="s3-temp">35</span>°C</p>
  </div>

</div>

<div id="alert" class="alert warning">
🚨 ALERT: High CPU detected!
</div>

<script>
function randomValue(min, max) {
  return Math.floor(Math.random() * (max - min) + min);
}

function updateServer(id) {
  let cpu = randomValue(10, 100);
  let temp = randomValue(25, 60);

  document.getElementById(id + "-cpu").innerText = cpu;
  document.getElementById(id + "-temp").innerText = temp;

  let statusEl = document.getElementById(id + "-status");

  if (cpu > 85) {
    statusEl.innerText = "High Load";
    statusEl.className = "warning";
    document.getElementById("alert").style.display = "block";
  } else if (cpu < 20) {
    statusEl.innerText = "Idle";
    statusEl.className = "online";
  } else {
    statusEl.innerText = "Online";
    statusEl.className = "online";
  }

  if (Math.random() < 0.05) {
    statusEl.innerText = "Offline";
    statusEl.className = "offline";
  }
}

setInterval(() => {
  updateServer("s1");
  updateServer("s2");
  updateServer("s3");
}, 2000);
</script>

</body>
</html>
